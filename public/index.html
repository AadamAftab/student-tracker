<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <img src="logo.jpg" alt="Logo" style="width: 300px; height: 200px; margin-bottom: 20px;">
      <h1>🎓 Student Tracker</h1>
      <input id="emailInput" type="email" placeholder="Email" />
      <input id="passwordInput" type="password" placeholder="Password" />
      <button onclick="handleLogin()">Login</button>
      <button class="secondary" onclick="handleSignup()">Create Account</button>
      <p id="authMsg" class="auth-msg"></p>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div id="appScreen" class="app" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
      <h1>🎓 Student Tracker
      </h1>
      <button id="logoutBtn" onclick="logoutUser()">Logout</button>
    </div>

    <!-- ===== DEADLINES ===== -->
    <div class="section">
      <h2>📅 Deadlines</h2>
      <div style="display:flex; gap:8px;">
        <input id="taskInput" placeholder="Assignment name" />
        <input id="dateInput" type="datetime-local" />
        <button onclick="addDeadline()">Add</button>
      </div>
      <ul id="deadlineList"></ul>
    </div>

    <!-- ===== UPCOMING CONTESTS ===== -->
    <div class="section" id="contestsSection">
      <h2>🚀 Upcoming Contests</h2>
      <div style="font-size: 14px; color: #8b92a5; margin-bottom: 15px;">Live feed from LeetCode & Codeforces</div>
      <ul id="contestList">
        <li style="justify-content: center; color: #8b92a5;">Loading contests...</li>
      </ul>
    </div>

    <!-- ===== CGPA PREDICTOR ===== -->
    <div class="section">
      <h2>🎓 CGPA Predictor</h2>
      <div style="display:flex; gap:8px;">
        <input id="cgSubject" placeholder="Course name" />
        <select id="cgGrade">
          <option value="">Grade</option>
          <option>A</option>
          <option>A-</option>
          <option>B+</option>
          <option>B</option>
          <option>B-</option>
          <option>C+</option>
          <option>C</option>
          <option>D</option>
          <option>F</option>
        </select>
        <input id="cgCredits" type="number" min="1" max="6" placeholder="Credits" />
        <button onclick="addCgpaCourse()">Add Course</button>
      </div>
      <div id="cgpaResult" style="margin-top:10px;"></div>
      <ul id="cgpaHistory"></ul>
    </div>

    <!-- ===== ATTENDANCE ===== -->
    <div class="section">
      <h2>📊 Attendance</h2>
      <div style="display:flex; gap:8px;">
        <input id="subjectInput" placeholder="Subject" />
        <button onclick="markPresent()">Present</button>
        <button onclick="markAbsent()" class="secondary">Absent</button>
      </div>
      <div id="attendanceDashboard" style="margin-top:12px;"></div>
      <ul id="attendanceList"></ul>
    </div>
  </div>

  <div>
    <h3 class="watermark"><a href="https://aadamaftab.github.io/resume-website/">©AAT</a></h3>
  </div>

  <script src="script.js"></script>
</body>

</html>
